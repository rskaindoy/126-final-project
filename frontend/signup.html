<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPV PAWtrol sign up</title>
    <link rel="stylesheet" href="css/style.css">    
</head>
<body>
    <header>
        </header>

    <div class="login-container">
        <h1>UPV PAWtrol</h1>
        <p>Create an account now</p>

        <form action="/api/user/signup" method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a unique username" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Password</label>
            <div class="password-box">
                <input type="password" name="password" id="password" placeholder="Create a password" required>
            </div>

            <label>Confirm Password</label>
            <div class="password-box">
                <input type="password" name="confirmPassword" id="confirm-pass" placeholder="Re-enter password" required>
                
                <span class="toggle-password" onclick="togglePassword()">Show</span>
            </div>

            <button type="submit">Sign Up</button>
        </form>

        <div class="signup">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="js/navbar.js"></script>
    <!-- show pw  -->
    <!-- TODO: maybe make it both have a show then specific lang dun sa isa or is this alr good? -->
    <script src="js/pass-toggle.js"></script>
</body>
</html>
